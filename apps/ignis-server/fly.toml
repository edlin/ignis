# fly.toml app configuration file generated for ednis on 2026-07-02T20:17:29Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ednis'
primary_region = 'ewr'

[build]
  dockerfile = 'Dockerfile'

[env]
  OBSIDIAN_ASSETS_PATH = '/data/app/obsidian-app'
  PORT = '8080'
  VAULT_ROOT = '/data/vaults'

[[mounts]]
  source = 'ednis_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
